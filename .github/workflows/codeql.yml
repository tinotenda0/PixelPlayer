name: "CodeQL Advanced"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '25 15 * * 0'

jobs:
  analyze:
    name: Analyze
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # v4 is current stable; v5 is emerging

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pin Kotlin version for CodeQL compatibility
        # CodeQL does not yet support Kotlin 2.4.0 (max: 2.3.x).
        # This overrides the version only for this CI job without touching source files.
        # TODO: remove once CodeQL adds Kotlin 2.4.0 support.
        run: echo "kotlin.version=2.3.20" >> gradle.properties

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
