<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>PixelPlayer Connect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sign in -->
  <section id="view-auth" class="view" hidden>
    <div class="auth-card">
      <div class="logo">🎧</div>
      <h1>PixelPlayer Connect</h1>
      <p class="muted">Control and play your Plex music on any device.</p>
      <button id="btn-signin" class="primary">Sign in with Plex</button>
      <p id="auth-status" class="muted small"></p>

      <div id="user-picker" hidden>
        <h2>Who's listening?</h2>
        <div id="user-list" class="user-list"></div>
        <div id="pin-row" hidden>
          <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="PIN">
          <button id="btn-pin-ok" class="primary">OK</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Main -->
  <section id="view-main" class="view" hidden>
    <header>
      <div>
        <div class="app-name">PixelPlayer Connect</div>
        <div id="user-name" class="muted small"></div>
      </div>
      <button id="btn-devices" class="chip">
        <span id="active-device-label">No device</span>
      </button>
    </header>

    <main>
      <div id="artwork" class="artwork"><span class="artwork-placeholder">♪</span></div>

      <div class="track-info">
        <div id="track-title" class="track-title">Nothing playing</div>
        <div id="track-artist" class="track-artist muted"></div>
      </div>

      <div class="seek-row">
        <span id="time-now" class="time">0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0">
        <span id="time-total" class="time">0:00</span>
      </div>

      <div class="controls">
        <button id="btn-prev" class="icon-btn" title="Previous">⏮</button>
        <button id="btn-play" class="icon-btn big" title="Play/Pause">▶</button>
        <button id="btn-next" class="icon-btn" title="Next">⏭</button>
      </div>

      <div class="volume-row">
        <span class="muted small">🔉</span>
        <input id="volume" type="range" min="0" max="100" value="100">
      </div>

      <h3 class="queue-heading muted small">QUEUE</h3>
      <ol id="queue" class="queue"></ol>
    </main>

    <!-- Device sheet -->
    <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
    <div id="device-sheet" class="sheet" hidden>
      <h2>Play on</h2>
      <div id="device-list" class="device-list"></div>
    </div>

    <!-- Browser-autoplay unlock -->
    <div id="tap-to-play" class="overlay" hidden>
      <button class="primary">Tap to start playback here</button>
    </div>
  </section>

  <audio id="audio" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
